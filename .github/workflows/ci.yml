name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test

  deploy:
    needs: check
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Apply D1 migrations
        run: npx wrangler d1 migrations apply mailbase --remote -c packages/api/wrangler.jsonc
      - name: Deploy email worker
        run: npx wrangler deploy -c packages/email-worker/wrangler.jsonc
      - name: Deploy api worker
        run: npx wrangler deploy -c packages/api/wrangler.jsonc
      - name: Build web
        run: npm run build -w packages/web
      - name: Deploy web
        run: npx wrangler deploy -c packages/web/wrangler.jsonc
